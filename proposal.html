<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파트너십 제안서 | 하이체크 D&C</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #191919; overflow: hidden; 
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 상단 퇴로 확보 */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(20, 20, 20, 0.95);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid rgba(203, 161, 113, 0.3);
        }
        .back-btn {
            color: #CBA171; text-decoration: none; font-weight: bold; font-size: 15px;
            display: flex; align-items: center; gap: 8px;
        }
        
        /* PDF 뷰어 영역 */
        .pdf-container {
            position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px);
            background-color: #333;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* 하단 긴급 다운로드 버튼 (뷰어가 안 뜰 경우 대비) */
        .footer-link {
            position: fixed; bottom: 10px; width: 100%; text-align: center;
            z-index: 50; font-size: 12px;
        }
        .footer-link a { color: rgba(255,255,255,0.5); text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <a href="index.html" class="back-btn">🧩 메인으로 돌아가기</a>
        <div style="color:#fff; font-size:13px; opacity:0.6;">Partnership Proposal</div>
    </div>

    <div class="pdf-container">
        <script>
            // 현재 사이트의 주소를 자동으로 파악해서 PDF 경로를 완성합니다.
            var pdfUrl = window.location.origin + "/hi-check-proposal.pdf";
            document.write('<iframe src="https://docs.google.com/viewer?url=' + encodeURIComponent(pdfUrl) + '&embedded=true"></iframe>');
        </script>
    </div>

    <div class="footer-link">
        <a href="hi-check-proposal.pdf" target="_blank">문서가 안 보이나요? 직접 열기 ➔</a>
    </div>

</body>
</html>
