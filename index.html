<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하이체크 D&C | 공간의 가치를 증명하는 기록</title>
    <style>
        /* 1. 기본 마감 설정 */
        body {
            background-color: #191919; 
            margin: 0; 
            font-family: 'Malgun Gothic', sans-serif;
            color: white;
            overflow-x: hidden; 
        }
        
        /* 2. 대문(1단) 설정 */
        .header-section {
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            height: 100vh; 
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 상단 네비게이션 */
        .top-nav {
            position: absolute; top: 0; width: 100%; padding: 40px 10px;
            display: flex; justify-content: center; gap: 40px; z-index: 10;
            box-sizing: border-box;
        }
        .top-nav a { color: white; text-decoration: none; font-size: 16px; font-weight: bold; opacity: 0.7; transition: 0.3s; white-space: nowrap; }
        .top-nav a:hover, .top-nav a.active { opacity: 1; color: #CBA171; }

        /* 중앙 로고 및 버튼 */
        .logo-img { width: 400px; max-width: 80%; margin-bottom: 40px; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5)); }
        
        /* ⭐️ 핵심 수정: 이동 경로를 proposal.html로 설정한 메인 버튼 */
        .cta-btn { 
            padding: 15px 40px; 
            font-size: 18px; 
            font-weight: bold; 
            color: white; 
            text-decoration: none; 
            border: 2px solid #CBA171; 
            border-radius: 500px; 
            transition: 0.3s; 
            background-color: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        .cta-btn:hover { background-color: #CBA171; color: #191919; transform: scale(1.05); }

        /* 스크롤 유도 화살표 */
        .scroll-arrow {
            position: absolute; bottom: 30px;
            animation: bounce 2s infinite; 
            cursor: pointer;
            text-decoration: none; 
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* 3. 책장 영역(2단) 설정 */
        .bookshelf-section {
            padding: 120px 20px;
            text-align: center;
            background-color: #191919;
        }
        .section-title { font-size: 32px; margin-bottom: 60px; color: #CBA171; letter-spacing: -1px; }
        
        .shelf-container {
            display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
            max-width: 1200px; margin: 0 auto;
        }
        
        .book-item {
            width: 320px; background: #252525; padding: 25px; border-radius: 15px;
            transition: 0.3s; cursor: pointer; text-decoration: none; color: white; display: block;
            box-sizing: border-box; border: 1px solid rgba(255,255,255,0.05);
        }
        .book-item:hover { transform: translateY(-15px); border-color: #CBA171; background: #2a2a2a; }
        
        .book-cover { 
            width: 100%; height: 450px; background: #444; margin-bottom: 20px; border-radius: 5px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        } 
        
        .book-title { font-size: 18px; font-weight: bold; line-height: 1.4; word-break: keep-all; }
        .book-subtitle { font-size: 14px; font-weight: normal; color: #aaaaaa; display: block; margin-top: 8px; }

        /* 4. 푸터 설정 */
        footer {
            padding: 60px 20px; background-color: #111; border-top: 1px solid #222;
            font-size: 13px; color: #777; line-height: 2; text-align: center;
        }

        /* 모바일 대응 */
        @media (max-width: 800px) {
            .top-nav { padding: 20px 10px; gap: 15px; flex-wrap: wrap; }
            .top-nav a { font-size: 14px; }
            .logo-img { width: 300px; }
            .cta-btn { font-size: 16px; padding: 12px 30px; }
            .section-title { font-size: 26px; }
            .book-item { width: 90%; max-width: 350px; }
            .book-cover { height: 480px; }
        }
    </style>
</head>
<body>

        <div class="top-nav">

            <a href="about.html">회사소개</a>

            <a href="portfolio.html">포트폴리오</a> 
            <a href="contact.html">문의하기</a>
        </div>
        
        <img src="logo.png" class="logo-img" alt="하이체크 D&C 로고">
        
        <a href="proposal.html" class="cta-btn">파트너십 제안서 확인하기</a>
        
        <a href="#bookshelf" class="scroll-arrow">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>

    </div>

    <div class="bookshelf-section" id="bookshelf">

        <div class="shelf-container">
            
            <a href="profile.pdf" target="_blank" class="book-item">
                <div class="book-cover" style="background-image: url('cover1.jpg'); background-size: cover; background-position: center;"></div> 
                <div class="book-title">
                    COMPANY BRAND LETTER<br>
                    <span class="book-subtitle">(파트너십 안내문)</span>
                </div>
            </a>
            
            <a href="reference.pdf" target="_blank" class="book-item">
                <div class="book-cover" style="background-image: url('cover2.jpg'); background-size: cover; background-position: center;"></div> 
                <div class="book-title">인테리어 시공 레퍼런스 북</div>

        </div>
    </div>

        <div style="margin-top: 20px; letter-spacing: 1px; color: #555;">&copy; 2026 HI-CHECK D&C. All Rights Reserved.</div>
    </footer>

</html>
