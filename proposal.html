<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파트너십 제안서 | 하이체크 D&C</title>
    <style>
        body { margin: 0; padding: 0; background-color: #191919; font-family: 'Malgun Gothic', sans-serif; color: white; }
        
        /* 상단 고정 바 (퇴로 확보) */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(17, 17, 17, 0.95);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid #CBA171;
            backdrop-filter: blur(10px);
        }
        .back-btn { color: #CBA171; text-decoration: none; font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 8px; }

        /* 제안서 이미지 영역 */
        .proposal-content { margin-top: 60px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .proposal-content img { width: 100%; max-width: 900px; height: auto; display: block; }

        /* 하단 다운로드 안내 */
        .footer-info { padding: 50px 20px; text-align: center; background-color: #111; }
        .download-link { color: #CBA171; text-decoration: none; border: 1px solid #CBA171; padding: 10px 20px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
