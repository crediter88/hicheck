<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파트너십 제안서 | 하이체크 D&C</title>
    <style>
        /* 1. 배경 및 기본 설정 */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #191919; overflow: hidden; 
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 2. 상단 퇴로 확보 (네비게이션 바) */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(20, 20, 20, 0.95);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid rgba(203, 161, 113, 0.3);
        }
        .back-btn {
            color: #CBA171; text-decoration: none; font-weight: bold; font-size: 15px;
            display: flex; align-items: center; gap: 8px;
        }
        .header-title { color: #ffffff; font-size: 14px; opacity: 0.8; }

        /* 3. PDF 관람창 (프레임 갇힘 방지) */
        .pdf-viewer {
            position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px);
            border: none;
        }

        /* 4. 모바일 대응 */
        @media (max-width: 600px) {
            .header-title { display: none; } /* 모바일에선 제목 숨기고 버튼만 강조 */
            .back-btn { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <a href="index.html" class="back-btn">🧩 메인으로 돌아가기</a>
        <div class="header-title">HI-CHECK D&C PARTNERSHIP PROPOSAL</div>
    </div>

    <iframe src="hi-check-proposal.pdf" class="pdf-viewer">
        <p>브라우저가 PDF 보기를 지원하지 않습니다. <a href="hi-check-proposal.pdf">여기에서 다운로드</a> 하세요.</p>
    </iframe>

</body>
</html>
