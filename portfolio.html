<!DOCTYPE html>
<html lang="ko">
<head>

    <title>포트폴리오 | 하이체크 D&C</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    <style>
        body { 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            margin: 0; 
            font-family: 'Malgun Gothic', sans-serif; 
            color: #eeeeee; 
            overflow-x: hidden;
        }
        .overlay { 
            background-color: rgba(0, 0, 0, 0.85); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 100px; 
            box-sizing: border-box;
        }

        /* 상단 네비게이션 - 모바일 대응 */
        .top-nav { 
            width: 100%; padding: 40px 10px; 
            display: flex; justify-content: center; gap: 40px; 
            box-sizing: border-box;
        }
        .top-nav a { 
            color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold; opacity: 0.7; transition: 0.3s; 
            white-space: nowrap;
        }
        .top-nav a:hover, .top-nav a.active { opacity: 1; color: #CBA171; }

        .page-header { margin-top: 50px; margin-bottom: 40px; text-align: center; padding: 0 20px; }
        .page-header h2 { font-size: 32px; color: #CBA171; margin: 0 0 10px 0; letter-spacing: 2px; }
        .page-header p { font-size: 16px; color: #aaaaaa; }

        /* 포트폴리오 그리드 */
        .portfolio-grid { 
            width: 90%; max-width: 1200px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
        }
        .port-card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            overflow: hidden; 
            text-decoration: none; 
            transition: 0.3s; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            cursor: pointer; 
        }
        .port-card:hover { transform: translateY(-10px); border-color: rgba(203, 161, 113, 0.5); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        
        .port-thumb { width: 100%; height: 220px; background-color: #222222; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .port-info { padding: 25px 20px; text-align: center; }
        .port-title { color: #ffffff; font-size: 17px; font-weight: bold; line-height: 1.4; margin-bottom: 10px; word-break: keep-all; }
        .port-desc { color: #CBA171; font-size: 13px; font-weight: bold; }

        /* ⭐️⭐️⭐️ 모바일 보수 공사 ⭐️⭐️⭐️ */
        @media (max-width: 900px) { 
            .portfolio-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } 
            .page-header h2 { font-size: 28px; }
        }
        
        @media (max-width: 650px) { 
            .top-nav { gap: 15px; padding: 20px 10px; flex-wrap: wrap; } 
            .top-nav a { font-size: 14px; }
            
            .portfolio-grid { grid-template-columns: 1fr; } /* 모바일은 한 줄에 하나씩 */
            .port-thumb { height: 250px; } /* 모바일에서 사진 시원하게 크게 */
            .port-title { font-size: 16px; }
            .page-header { margin-top: 30px; }
        }
    </style>
</head>
