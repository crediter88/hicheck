    <title>포트폴리오 | 하이체크 D&C</title>
    <style>
        body {
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
            color: #eeeeee;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.85); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px; 
        }

        /* 상단 네비게이션 (모든 링크 연결 완료) */
        .top-nav {
            width: 100%; padding: 40px 0;
            display: flex; justify-content: center; gap: 60px;
        }
        .top-nav a {
            color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold; opacity: 0.7; transition: 0.3s;
        }
        .top-nav a:hover, .top-nav a.active {
            opacity: 1; color: #CBA171;
        }

        .page-header {
            margin-top: 50px;
            margin-bottom: 40px;
            text-align: center;
        }
        .page-header h2 {
            font-size: 32px;
            color: #CBA171;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }
        .page-header p {
            color: #aaaaaa;
            font-size: 16px;
            margin: 0;
        }

        .portfolio-grid {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px;
        }

        .port-card {
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            overflow: hidden; 
            text-decoration: none; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .port-card:hover {
            transform: translateY(-10px);
            border-color: rgba(203, 161, 113, 0.5);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .port-thumb {
            width: 100%;
            height: 220px;
            background-color: #222222;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .port-info {
            padding: 25px 20px;
            text-align: center;
        }
        .port-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 10px;
            word-break: keep-all;
        }
        .port-desc {
            color: #CBA171;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .portfolio-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            .top-nav { gap: 20px; font-size: 14px; flex-wrap: wrap; }
        }
    </style>
</head>
