<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파트너십 제안서 | 하이체크 D&C</title>
    <style>
        body {
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
            color: #eeeeee;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.85); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px; 
        }

        /* 상단 네비게이션 (모든 링크 연결 완료) */
        .top-nav {
            width: 100%; padding: 40px 0;
            display: flex; justify-content: center; gap: 60px;
        }
        .top-nav a {
            color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold; opacity: 0.7; transition: 0.3s;
        }
        .top-nav a:hover, .top-nav a.active {
            opacity: 1; color: #CBA171;
        }

        .pdf-container {
            width: 95%; 
            max-width: 1100px; 
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 100px; 
        }

        .pdf-section {
            background: #111111; 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .pdf-title {
            font-size: 22px;
            color: #CBA171;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .pdf-frame {
            width: 100%;
            height: 1000px; 
            border: none;
            border-radius: 5px;
            background-color: #ffffff;
        }

        @media (max-width: 800px) {
            .pdf-frame { height: 80vh; min-height: 600px; } 
            .top-nav { gap: 20px; font-size: 14px; flex-wrap: wrap; }
            .pdf-container { width: 98%; padding: 0 10px; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div class="overlay">
        
        <div class="top-nav">
            <a href="index.html">HOME</a>
            <a href="about.html">회사소개</a>
            <a href="fields.html">시공분야</a>
            <a href="proposal.html" class="active">파트너십 제안서</a>
            <a href="portfolio.html">포트폴리오</a>
            <a href="contact.html">문의하기</a>
        </div>

        <div class="pdf-container">
            
            <div class="pdf-section">
                <div class="pdf-title">COMPANY BRAND LETTER (파트너십 안내문)</div>
                <iframe src="profile.pdf#view=FitH" class="pdf-frame" title="파트너십 안내문"></iframe>
            </div>

            <div class="pdf-section">
                <div class="pdf-title">REFERENCE BOOK (시공 레퍼런스)</div>
                <iframe src="reference.pdf#view=FitH" class="pdf-frame" title="시공 레퍼런스 북"></iframe>
            </div>

        </div>

    </div>

</body>
</html>
