<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>문의하기 | 하이체크 D&C</title>
    <style>
        /* 기본 배경 */
        body {
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
            color: #eeeeee;
            overflow-x: hidden;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.75); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* 상단 네비게이션 바 */
        .top-nav {
            width: 100%; padding: 40px 10px;
            display: flex; justify-content: center; gap: 40px;
            box-sizing: border-box;
        }
        .top-nav a {
            color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold; opacity: 0.7; transition: 0.3s;
            white-space: nowrap;
        }
        .top-nav a:hover, .top-nav a.active {
            opacity: 1; color: #CBA171;
        }

        /* ⭐️ 반투명 흑유리 명판 */
        .contact-box {
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; 
            padding: 60px 50px; 
            max-width: 650px; 
            width: 90%;
            margin-top: 30px; 
            margin-bottom: 80px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); 
            text-align: center;
            box-sizing: border-box;
        }

        /* 제목 영역 */
        .contact-box h2 {
            font-size: 32px; color: #CBA171; margin-top: 0; margin-bottom: 10px; letter-spacing: 2px;
        }
        .contact-box .subtitle {
            font-size: 16px; color: #aaaaaa; margin-bottom: 40px; letter-spacing: 0.5px;
            word-break: keep-all; line-height: 1.4;
        }

        /* 연락처 정보 리스트 */
        .info-list {
            text-align: left;
            margin-bottom: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 30px 0;
        }
        .info-item {
            margin-bottom: 20px;
            font-size: 16px;
            display: flex;
            align-items: flex-start; /* 주소가 길어질 경우 대비 */
        }
        .info-item:last-child { margin-bottom: 0; }
        .info-label {
            color: #CBA171;
            font-weight: bold;
            width: 90px;
            flex-shrink: 0;
        }
        .info-value {
            color: #dddddd;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* ⭐️ 터치 연결 버튼 (전화 / 이메일) */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            color: #191919;
            background-color: #CBA171;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1; /* 버튼 너비를 동일하게 */
            min-width: 200px;
            justify-content: center;
        }
        .action-btn:hover {
            background-color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .action-btn.outline {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .action-btn.outline:hover {
            border-color: #ffffff;
            background-color: rgba(255,255,255,0.1);
        }

        /* ⭐️⭐️⭐️ 모바일 보수 공사 (800px 이하) ⭐️⭐️⭐️ */
        @media (max-width: 800px) {
            .top-nav { padding: 20px 10px; gap: 15px; flex-wrap: wrap; }
            .top-nav a { font-size: 14px; }
            
            .contact-box { padding: 40px 25px; margin-top: 20px; }
            .contact-box h2 { font-size: 26px; }
            .contact-box .subtitle { font-size: 14px; }
            
            .info-item { flex-direction: column; gap: 5px; }
            .info-label { font-size: 14px; margin-bottom: 2px; }
            .info-value { font-size: 15px; }

            .btn-group { flex-direction: column; }
            .action-btn { width: 100%; min-width: unset; }
        }
    </style>
</head>
<body>

    <div class="overlay">
        
        <div class="top-nav">
            <a href="index.html">HOME</a>
            <a href="about.html">회사소개</a>
            <a href="fields.html">시공분야</a>
            <a href="proposal.html">파트너십 제안서</a>
            <a href="portfolio.html">포트폴리오</a>
            <a href="contact.html" class="active">문의하기</a>
        </div>

        <div class="contact-box">
            <h2>CONTACT US</h2>
            <div class="subtitle">프로젝트 및 시공문의는 아래 연락처나 이메일로 문의주세요</div>

            <div class="info-list">
                <div class="info-item">
                    <div class="info-label">Company</div>
                    <div class="info-value">(주)하이체크 D&C</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Address</div>
                    <div class="info-value">경기도 남양주시 다산중앙로 19번길 25-23 F504호</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Phone</div>
                    <div class="info-value">010-4828-1149</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value">kh73kim@naver.com</div>
                </div>
            </div>

            <div class="btn-group">
                <a href="tel:01048281149" class="action-btn">📞 전화 상담하기</a>
                <a href="mailto:kh73kim@naver.com" class="action-btn outline">✉️ 이메일 보내기</a>
            </div>
        </div>

    </div>

</body>
</html>
