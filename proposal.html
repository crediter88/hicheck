<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파트너십 제안서 | 하이체크 D&C</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #191919; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        
        /* 상단 고정 바 (퇴로 확보) */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: #111111;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid #CBA171;
        }
        .back-btn { color: #CBA171; text-decoration: none; font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* ⭐️ 로딩 속도 개선을 위한 PDF 전용 컨테이너 */
        .pdf-container { 
            position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); 
            background-color: #333; 
        }

        /* ⭐️ 아이폰에서 삐져나가는 현상을 방지하는 '객체 삽입' 방식 */
        object, embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <a href="index.html" class="back-btn">🧩 메인으로 돌아가기</a>
        <div style="color:#CBA171; font-size:13px;">HI-CHECK PROPOSAL</div>
    </div>

    <div class="pdf-container">
        <object data="hi-check-proposal.pdf" type="application/pdf">
            <embed src="hi-check-proposal.pdf" type="application/pdf" />
            <iframe src="hi-check-proposal.pdf"></iframe>
        </object>
    </div>

</body>
</html>
